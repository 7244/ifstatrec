<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifstatrec view</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #f5f5f5; padding: 20px; }
    #container { background: #fff; border: 1px solid #ccc; }
    #tooltip { position: fixed; background: #333; color: #fff; padding: 4px 8px; font-size: 12px; display: none; pointer-events: none; }
    #info { margin-bottom: 10px; color: #666; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="container"><canvas id="canvas"></canvas></div>
  <div id="tooltip"></div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const info = document.getElementById('info');
    const FLAG_VALID = 0, FLAG_DELAYED = 1;
    const COLORS = ['#2563eb', '#16a34a', '#9333ea', '#eab308', '#dc2626'];

    let data = [], nsPer = 0, counterCount = 0, padding = 60;
    let width, height, viewStart = 0, viewEnd = null;
    let isPanning = false, panStartX = 0;

    function resize() {
      width = window.innerWidth - 40;
      height = 400;
      canvas.width = width;
      canvas.height = height;
      draw();
    }

    function clampView() {
      const maxTime = data.length - 1;
      if (maxTime <= 0) return { start: 0, end: 0, span: 0 };
      if (viewEnd === null || isNaN(viewEnd)) viewEnd = maxTime;
      if (viewStart < 0) viewStart = 0;
      if (viewEnd > maxTime) viewEnd = maxTime;
      if (viewEnd - viewStart < 0.5) {
        const mid = (viewStart + viewEnd) / 2;
        viewStart = mid - 0.25;
        viewEnd = mid + 0.25;
        if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
        if (viewEnd > maxTime) { viewStart -= viewEnd - maxTime; viewEnd = maxTime; }
      }
      return { start: viewStart, end: viewEnd, span: viewEnd - viewStart };
    }

    function draw() {
      if (!data.length) return;
      const { start, end, span: timeSpan } = clampView();
      if (!end) return;
      const plotW = width - padding * 2;
      const plotH = height - padding * 2;
      const iStart = Math.floor(start), iEnd = Math.min(Math.floor(end), data.length - 1);

      let maxVals = new Array(counterCount).fill(0);
      for (let i = iStart; i <= iEnd; i++) {
        if (data[i].flags === FLAG_VALID) {
          for (let j = 0; j < counterCount; j++)
            if (data[i].values[j] > maxVals[j]) maxVals[j] = data[i].values[j];
        }
      }
      if (maxVals.every(v => v === 0)) maxVals = maxVals.map(() => 1);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#666';
      ctx.font = '11px monospace';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 5; i++) {
        const y = padding + (plotH / 5) * i;
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(width - padding, y);
        ctx.stroke();
        ctx.fillText(Math.round(maxVals[0] * (5 - i) / 5), padding - 8, y + 4);
      }

      const maxTicks = 10;
      const rawInterval = timeSpan / maxTicks;
      const mag = Math.pow(10, Math.floor(Math.log10(rawInterval)));
      const res = rawInterval / mag;
      const interval = res > 5 ? mag * 10 : res > 2 ? mag * 5 : res > 1 ? mag * 2 : mag;
      const numTicks = Math.max(2, Math.floor(timeSpan / interval));
      ctx.textAlign = 'center';
      for (let i = 0; i <= numTicks; i++) {
        const t = start + i * interval;
        if (t > end + 0.0001) break;
        const x = padding + ((t - start) / timeSpan) * plotW;
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, height - padding);
        ctx.stroke();
        ctx.fillText((t / 1000).toFixed(2) + 's', x, height - padding + 20);
      }

      for (let j = 0; j < counterCount; j++) {
        ctx.strokeStyle = COLORS[j % COLORS.length];
        ctx.lineWidth = 2;
        ctx.beginPath();
        let prevFailed = false;
        for (let i = iStart; i <= iEnd; i++) {
          if (i >= data.length) break;
          const x = padding + ((i - start) / timeSpan) * plotW;
          if (data[i].flags !== FLAG_VALID) { prevFailed = true; continue; }
          const y = height - padding - (data[i].values[j] / maxVals[j]) * plotH;
          prevFailed || i === iStart ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          prevFailed = false;
        }
        ctx.stroke();
      }

      for (let i = iStart; i <= iEnd; i++) {
        const x = padding + ((i - start) / timeSpan) * plotW;
        if (data[i].flags !== FLAG_VALID) {
          ctx.strokeStyle = '#dc2626';
          ctx.lineWidth = 2;
          const y = padding + 10;
          ctx.beginPath();
          ctx.moveTo(x - 5, y - 5); ctx.lineTo(x + 5, y + 5);
          ctx.moveTo(x + 5, y - 5); ctx.lineTo(x - 5, y + 5);
          ctx.stroke();
        } else {
          for (let j = 0; j < counterCount; j++) {
            ctx.fillStyle = COLORS[j % COLORS.length];
            ctx.beginPath();
            ctx.arc(x, height - padding - (data[i].values[j] / maxVals[j]) * plotH, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      info.textContent = `${data.length} points | View: ${(start/1000).toFixed(2)}s - ${(end/1000).toFixed(2)}s (${(timeSpan/1000).toFixed(2)}s) | Scroll to zoom, drag to pan, dbl-click to reset`;
    }

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (!data.length) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (mx < padding || mx > width - padding || my < padding || my > height - padding) return;
      const plotW = width - padding * 2;
      const { start, end } = clampView();
      const currentSpan = end - start;
      const mouseRatio = (mx - padding) / plotW;
      const mouseTime = start + mouseRatio * currentSpan;
      const newSpan = currentSpan * (e.deltaY < 0 ? 0.8 : 1.25);
      viewStart = mouseTime - mouseRatio * newSpan;
      viewEnd = mouseTime + (1 - mouseRatio) * newSpan;
      draw();
    }, { passive: false });

    canvas.addEventListener('mousemove', (e) => {
      if (isPanning) {
        tooltip.style.display = 'none';
        if (!data.length) { isPanning = false; return; }
        const dx = e.clientX - panStartX;
        panStartX = e.clientX;
        const { start, end } = clampView();
        const timeDelta = -dx / (width - padding * 2) * (end - start);
        viewStart += timeDelta;
        viewEnd += timeDelta;
        const maxTime = data.length - 1;
        if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
        if (viewEnd > maxTime) { viewStart -= viewEnd - maxTime; viewEnd = maxTime; }
        if (viewStart < 0) viewStart = 0;
        draw();
      } else {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const { start, end } = clampView();
        const plotW = width - padding * 2;
        const time = start + (mx - padding) / plotW * (end - start);
        let closestIdx = null, minDist = Infinity;
        for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
          const dist = Math.abs(i - time);
          if (dist < minDist) { minDist = dist; closestIdx = i; }
        }
        if (closestIdx !== null) {
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 10) + 'px';
          tooltip.style.top = (e.clientY - 20) + 'px';
          const pt = data[closestIdx];
          tooltip.textContent = pt.flags === FLAG_DELAYED
            ? `t=${(closestIdx / 1000).toFixed(3)}s  DELAYED`
            : `t=${(closestIdx / 1000).toFixed(3)}s  ${pt.values.join(' / ')}`;
        }
      }
    });

    canvas.addEventListener('mouseup', () => isPanning = false);

    canvas.addEventListener('dblclick', () => {
      viewStart = 0;
      viewEnd = null;
      clampView();
      draw();
    });

    canvas.addEventListener('mousedown', (e) => {
      if (!data.length) return;
      isPanning = true;
      panStartX = e.clientX;
    });

    fetch('record.ifsr')
      .then(r => r.arrayBuffer())
      .then(buf => {
        const view = new DataView(buf);
        let off = 0;
        const r64 = () => { const v = Number(view.getBigUint64(off, true)); off += 8; return v; };
        counterCount = r64();
        nsPer = r64();
        const totalPoints = r64();
        r64();
        data = [];
        for (let i = 0; i < totalPoints; i++) {
          const code = view.getUint8(off); off++;
          if (code === FLAG_VALID) {
            const values = [];
            for (let j = 0; j < counterCount; j++) values.push(r64());
            data.push({ flags: code, values });
          } else {
            data.push({ flags: code });
          }
        }
        draw();
      })
      .catch(e => info.textContent = 'Error: ' + e);

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
