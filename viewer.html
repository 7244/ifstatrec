<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifstatrec view</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #f5f5f5; padding: 20px; }
    #container { background: #fff; border: 1px solid #ccc; }
    #tooltip { position: fixed; background: #333; color: #fff; padding: 4px 8px; font-size: 12px; display: none; }
    #info { margin-bottom: 10px; color: #666; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>
  <div id="tooltip"></div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const info = document.getElementById('info');

    const FLAG_VALID = 0;
    const FLAG_DELAYED = 1;

    const SERIES_COLORS = ['#2563eb', '#16a34a', '#9333ea', '#eab308', '#dc2626'];

    let data = [];
    let nsPer = 0;
    let counterCount = 0;
    let padding = 60;
    let width, height;
    let viewStart = 0;
    let viewEnd = null;
    let isPanning = false;
    let panStart = 0;

    function resize() {
      width = window.innerWidth - 40;
      height = 400;
      canvas.width = width;
      canvas.height = height;
      draw();
    }

    function getViewRange() {
      const maxTime = data.length - 1;
      if (maxTime <= 0) return { start: 0, end: 0, span: 0 };
      if (viewEnd === null || isNaN(viewEnd)) viewEnd = maxTime;
      if (viewStart < 0) viewStart = 0;
      if (viewEnd > maxTime) viewEnd = maxTime;
      if (viewEnd - viewStart < 0.5) {
        const mid = (viewStart + viewEnd) / 2;
        viewStart = mid - 0.25;
        viewEnd = mid + 0.25;
        if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
        if (viewEnd > maxTime) { viewStart -= viewEnd - maxTime; viewEnd = maxTime; }
      }
      return { start: viewStart, end: viewEnd, span: viewEnd - viewStart };
    }

    function draw() {
      if (!data.length) return;
      const { start, end } = getViewRange();
      if (!end) return;
      const plotW = width - padding * 2;
      const plotH = height - padding * 2;
      const timeSpan = end - start;

      let maxVals = new Array(counterCount).fill(0);
      for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
        if (data[i].flags === FLAG_VALID) {
          for (let j = 0; j < counterCount; j++) {
            if (data[i].values[j] > maxVals[j]) maxVals[j] = data[i].values[j];
          }
        }
      }
      if (maxVals.every(v => v === 0)) maxVals = maxVals.map(() => 1);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = padding + (plotH / 5) * i;
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(width - padding, y);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.font = '11px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVals[0] * (5 - i) / 5), padding - 8, y + 4);
      }

      const maxTicks = 10;
      const rawInterval = timeSpan / maxTicks;
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawInterval)));
      const residual = rawInterval / magnitude;
      let interval = residual > 5 ? magnitude * 10 : residual > 2 ? magnitude * 5 : residual > 1 ? magnitude * 2 : magnitude;
      const numTicks = Math.max(2, Math.floor(timeSpan / interval));
      for (let i = 0; i <= numTicks; i++) {
        const t = start + i * interval;
        if (t > end + 0.0001) break;
        const x = padding + ((t - start) / timeSpan) * plotW;
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, height - padding);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText((t / 1000).toFixed(2) + 's', x, height - padding + 20);
      }

      for (let j = 0; j < counterCount; j++) {
        ctx.strokeStyle = SERIES_COLORS[j % SERIES_COLORS.length];
        ctx.lineWidth = 2;
        ctx.beginPath();
        let prevFailed = false;
        for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
          const x = padding + ((i - start) / timeSpan) * plotW;
          if (data[i].flags !== FLAG_VALID) {
            prevFailed = true;
            continue;
          }
          const y = height - padding - (data[i].values[j] / maxVals[j]) * plotH;
          if (prevFailed || i === 0 || (i > 0 && (i - 1) < start)) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
          prevFailed = false;
        }
        ctx.stroke();
      }

      ctx.fillStyle = '#2563eb';
      for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
        const x = padding + ((i - start) / timeSpan) * plotW;
        if (data[i].flags !== FLAG_VALID) {
          ctx.strokeStyle = '#dc2626';
          ctx.lineWidth = 2;
          const y = padding + 10;
          ctx.beginPath();
          ctx.moveTo(x - 5, y - 5);
          ctx.lineTo(x + 5, y + 5);
          ctx.moveTo(x + 5, y - 5);
          ctx.lineTo(x - 5, y + 5);
          ctx.stroke();
        } else {
          for (let j = 0; j < counterCount; j++) {
            const y = height - padding - (data[i].values[j] / maxVals[j]) * plotH;
            ctx.fillStyle = SERIES_COLORS[j % SERIES_COLORS.length];
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      info.textContent = `${data.length} points | View: ${(start/1000).toFixed(2)}s - ${(end/1000).toFixed(2)}s (${(timeSpan/1000).toFixed(2)}s) | Scroll to zoom, drag to pan, dbl-click to reset`;
    }

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (!data.length) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      if (mx < padding || mx > width - padding || my < padding || my > height - padding) return;
      const plotW = width - padding * 2;
      const { start, end } = getViewRange();
      const currentSpan = end - start;
      const mouseRatio = (mx - padding) / plotW;
      const mouseTime = start + mouseRatio * currentSpan;
      const zoomFactor = e.deltaY < 0 ? 0.8 : 1.25;
      const newSpan = currentSpan * zoomFactor;
      viewStart = mouseTime - mouseRatio * newSpan;
      viewEnd = mouseTime + (1 - mouseRatio) * newSpan;
      draw();
    }, { passive: false });

    canvas.addEventListener('mousemove', (e) => {
      if (isPanning) {
        tooltip.style.display = 'none';
        if (!data.length) { isPanning = false; return; }
        const dx = e.clientX - panStart;
        panStart = e.clientX;
        const { start, end } = getViewRange();
        const plotW = width - padding * 2;
        const timeDelta = -dx / plotW * (end - start);
        viewStart += timeDelta;
        viewEnd += timeDelta;
        const maxTime = data.length - 1;
        if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
        if (viewEnd > maxTime) { viewStart -= viewEnd - maxTime; viewEnd = maxTime; }
        if (viewStart < 0) viewStart = 0;
        draw();
      } else {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const { start, end } = getViewRange();
        const plotW = width - padding * 2;
        const timeSpan = end - start;
        const time = start + (mx - padding) / plotW * timeSpan;
        let closestIdx = null, minDist = Infinity;
        for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
          const dist = Math.abs(i - time);
          if (dist < minDist) { minDist = dist; closestIdx = i; }
        }
        if (closestIdx !== null) {
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 10) + 'px';
          tooltip.style.top = (e.clientY - 20) + 'px';
          const pt = data[closestIdx];
          if (pt.flags === FLAG_DELAYED) {
            tooltip.textContent = `t=${(closestIdx / 1000).toFixed(3)}s  DELAYED`;
          } else {
            tooltip.textContent = `t=${(closestIdx / 1000).toFixed(3)}s  ${pt.values.join(' / ')}`;
          }
        }
      }
    });

    canvas.addEventListener('mouseup', () => isPanning = false);

    canvas.addEventListener('dblclick', () => {
      viewStart = 0;
      viewEnd = null;
      getViewRange();
      draw();
    });

    canvas.addEventListener('mousedown', (e) => {
      if (!data.length) return;
      isPanning = true;
      panStart = e.clientX;
    });

    fetch('record.ifsr')
      .then(r => r.arrayBuffer())
      .then(buf => {
        const view = new DataView(buf);
        let off = 0;
        counterCount = Number(view.getBigUint64(off, true)); off += 8;
        nsPer = Number(view.getBigUint64(off, true)); off += 8;
        const totalPoints = Number(view.getBigUint64(off, true)); off += 8;
        const dataBytes = Number(view.getBigUint64(off, true)); off += 8;

        data = [];
        for (let i = 0; i < totalPoints; i++) {
          const code = view.getUint8(off); off += 1;
          if (code === FLAG_VALID) {
            const values = [];
            for (let j = 0; j < counterCount; j++) {
              values.push(Number(view.getBigUint64(off, true))); off += 8;
            }
            data.push({ flags: code, values });
          } else {
            data.push({ flags: code });
          }
        }
        draw();
      })
      .catch(e => {
        info.textContent = 'Error: ' + e;
      });

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
