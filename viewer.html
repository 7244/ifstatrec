<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifstatrec view</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #f5f5f5; padding: 20px; }
    #container { background: #fff; border: 1px solid #ccc; }
    #tooltip { position: fixed; background: #333; color: #fff; padding: 4px 8px; font-size: 12px; display: none; }
    #info { margin-bottom: 10px; color: #666; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>
  <div id="tooltip"></div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const info = document.getElementById('info');

    let data = [];
    let padding = 60;
    let width, height;
    let viewStart = 0;
    let viewEnd = null;
    let isPanning = false;
    let panStart = 0;

    function resize() {
      width = window.innerWidth - 40;
      height = 400;
      canvas.width = width;
      canvas.height = height;
      draw();
    }

    function getViewRange() {
      const maxTime = (data.length - 1);
      const start = (viewStart !== null && !isNaN(viewStart)) ? viewStart : 0;
      let end = (viewEnd !== null && !isNaN(viewEnd)) ? viewEnd : maxTime;
      if (end <= start) { viewStart = 0; viewEnd = maxTime; return { start: 0, end: maxTime, span: maxTime }; }
      return { start, end, span: end - start };
    }

    function getVisiblePackets() {
      const { start, end } = getViewRange();
      const packets = [];
      for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
        packets.push(data[i]);
      }
      return packets;
    }

    function draw() {
      if (!data.length) return;
      const { start, end } = getViewRange();
      if (start === end) return;
      const packets = getVisiblePackets();
      const maxPackets = packets.length ? Math.max(...packets) : 1;
      const plotW = width - padding * 2;
      const plotH = height - padding * 2;
      const timeSpan = end - start;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = padding + (plotH / 5) * i;
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(width - padding, y);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.font = '11px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxPackets * (5 - i) / 5), padding - 8, y + 4);
      }

      const maxTicks = 10;
      const rawInterval = timeSpan / maxTicks;
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawInterval)));
      const residual = rawInterval / magnitude;
      let interval = residual > 5 ? magnitude * 10 : residual > 2 ? magnitude * 5 : residual > 1 ? magnitude * 2 : magnitude;
      const numTicks = Math.max(2, Math.floor(timeSpan / interval));
      for (let i = 0; i <= numTicks; i++) {
        const t = start + i * interval;
        if (t > end + 0.0001) break;
        const x = padding + ((t - start) / timeSpan) * plotW;
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, height - padding);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText((t / 1000).toFixed(2) + 's', x, height - padding + 20);
      }

      const FAILED_VAL = 18446744073709551615;

      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 2;
      ctx.beginPath();
      let prevFailed = false;
      for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
        const t = i;
        const x = padding + ((t - start) / timeSpan) * plotW;
        const isFailed = data[i] === FAILED_VAL;
        if (isFailed) {
          prevFailed = true;
          continue;
        }
        const y = height - padding - (data[i] / maxPackets) * plotH;
        if (prevFailed || i === 0 || (i > 0 && (i - 1) < start)) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        prevFailed = false;
      }
      ctx.stroke();

      ctx.fillStyle = '#2563eb';
      for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
        const t = i;
        const x = padding + ((t - start) / timeSpan) * plotW;
        const isFailed = data[i] === FAILED_VAL;
        if (isFailed) {
          ctx.fillStyle = '#dc2626';
          ctx.strokeStyle = '#dc2626';
          ctx.lineWidth = 2;
          const y = padding + 10;
          ctx.beginPath();
          ctx.moveTo(x - 5, y - 5);
          ctx.lineTo(x + 5, y + 5);
          ctx.moveTo(x + 5, y - 5);
          ctx.lineTo(x - 5, y + 5);
          ctx.stroke();
        } else {
          const y = height - padding - (data[i] / maxPackets) * plotH;
          ctx.fillStyle = '#2563eb';
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      info.textContent = `${data.length} points | View: ${(start/1000).toFixed(2)}s - ${(end/1000).toFixed(2)}s (${(timeSpan/1000).toFixed(2)}s) | Scroll to zoom, drag to pan, dbl-click to reset`;
    }

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (!data.length) return;
      if (viewEnd === null || isNaN(viewEnd)) {
        viewEnd = data.length - 1;
      }
      if (viewStart === viewEnd) {
        viewStart = 0;
        viewEnd = data.length - 1;
      }
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const plotW = width - padding * 2;
      const currentSpan = viewEnd - viewStart;
      const mouseTime = viewStart + ((mx - padding) / plotW) * currentSpan;
      const zoomFactor = e.deltaY < 0 ? 0.8 : 1.25;
      const newSpan = currentSpan * zoomFactor;
      const mouseRatio = (mouseTime - viewStart) / currentSpan;
      viewStart = mouseTime - newSpan * mouseRatio;
      viewEnd = mouseTime + newSpan * (1 - mouseRatio);
      draw();
    }, { passive: false });

    canvas.addEventListener('mousemove', (e) => {
      if (isPanning) {
        tooltip.style.display = 'none';
        if (!data.length) { isPanning = false; return; }
        if (viewEnd === null || isNaN(viewEnd)) {
          viewEnd = data.length - 1;
        }
        if (viewStart === viewEnd) {
          viewStart = 0;
          viewEnd = data.length - 1;
        }
        const dx = e.clientX - panStart;
        panStart = e.clientX;
        const plotW = width - padding * 2;
        const timeSpan = viewEnd - viewStart;
        const timeDelta = -dx / plotW * timeSpan;
        viewStart += timeDelta;
        viewEnd += timeDelta;
        if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
        if (viewEnd > data.length - 1) { viewStart -= viewEnd - (data.length - 1); viewEnd = data.length - 1; }
        draw();
      } else {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const { start, end } = getViewRange();
        const packets = getVisiblePackets();
        const maxPackets = packets.length ? Math.max(...packets) : 1;
        const plotW = width - padding * 2;
        const plotH = height - padding * 2;
        const timeSpan = end - start;
        const time = start + (mx - padding) / plotW * timeSpan;
        let closestIdx = null, minDist = Infinity;
        for (let i = Math.floor(start); i <= Math.floor(end) && i < data.length; i++) {
          const dist = Math.abs(i - time);
          if (dist < minDist) { minDist = dist; closestIdx = i; }
        }
        if (closestIdx !== null) {
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 10) + 'px';
          tooltip.style.top = (e.clientY - 20) + 'px';
          const isFailed = data[closestIdx] === 18446744073709551615;
          tooltip.textContent = `t=${(closestIdx / 1000).toFixed(3)}s  packets=${isFailed ? 'FAILED' : data[closestIdx]}`;
        }
      }
    });

    canvas.addEventListener('mouseup', () => isPanning = false);

    canvas.addEventListener('dblclick', () => {
      viewStart = 0;
      viewEnd = null;
      draw();
    });

    canvas.addEventListener('mousedown', (e) => {
      if (!data.length) return;
      if (viewEnd === null || isNaN(viewEnd)) {
        viewEnd = data.length - 1;
      }
      if (viewStart === viewEnd) {
        viewStart = 0;
        viewEnd = data.length - 1;
      }
      isPanning = true;
      panStart = e.clientX;
    });

    fetch('record.json')
      .then(r => r.json())
      .then(d => {
        data = d;
        draw();
      })
      .catch(() => {
        info.textContent = 'Error: record.json not found';
      });

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
